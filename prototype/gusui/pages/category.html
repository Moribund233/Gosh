<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>谷穗 · 商品分类</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .category-layout { display: flex; height: 100%; }
    .cat-sidebar {
      width: 85px;
      flex-shrink: 0;
      background: var(--surface-2);
      overflow-y: auto;
      border-right: 1px solid var(--border-soft);
    }
    .cat-sidebar::-webkit-scrollbar { display: none; }
    .cat-sidebar .cat-item {
      padding: 14px 8px;
      text-align: center;
      font-size: 13px;
      color: var(--fg-soft);
      border-left: 3px solid transparent;
      transition: all 0.15s;
      cursor: pointer;
    }
    .cat-sidebar .cat-item.active {
      background: var(--surface);
      color: var(--accent);
      font-weight: 600;
      border-left-color: var(--accent);
    }
    .cat-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--sp-3) var(--sp-3) var(--sp-6);
    }
    .cat-content::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page-container">
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="icons">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="5" width="14" height="14" rx="2"/><line x1="6" y1="10" x2="20" y2="10"/></svg>
        </div>
      </div>
      <div class="nav-bar">
        <a href="home.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="title">商品分类</span>
        <a href="search.html" class="right-action" style="color:var(--fg-soft);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>
        </a>
      </div>

      <div class="content" style="padding:0;">
        <div class="category-layout">
          <!-- 左侧分类 -->
          <div class="cat-sidebar">
            <div class="cat-item active">🌾 米面粮油</div>
            <div class="cat-item">🫘 豆类杂粮</div>
            <div class="cat-item">🍄 菌菇干货</div>
            <div class="cat-item">🥜 坚果干果</div>
            <div class="cat-item">🌶️ 调味干货</div>
            <div class="cat-item">🍵 花草茶饮</div>
            <div class="cat-item">🍯 蜜饯果脯</div>
            <div class="cat-item">🥬 海产干货</div>
          </div>

          <!-- 右侧内容 -->
          <div class="cat-content">
            <!-- 当前分类标题 -->
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:var(--sp-3);">
              <span style="font-size:20px;">🌾</span>
              <h2 style="font-size:var(--fs-title);font-weight:600;">米面粮油</h2>
            </div>

            <!-- 子分类 -->
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:var(--sp-4);">
              <span class="btn-outline active">全部</span>
              <span class="btn-outline">大米</span>
              <span class="btn-outline">面粉</span>
              <span class="btn-outline">杂粮米</span>
              <span class="btn-outline">食用油</span>
              <span class="btn-outline">面条</span>
            </div>

            <!-- 商品网格 -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);">
              <a href="product.html" class="product-card">
                <div class="img-placeholder">🌾</div>
                <div class="info">
                  <div class="name">有机五常稻花香 5kg</div>
                  <div class="spec">黑龙江·五常</div>
                  <div class="price-row">
                    <span class="price">¥49.9</span>
                    <button class="cart-add">+</button>
                  </div>
                </div>
              </a>
              <a href="product.html" class="product-card">
                <div class="img-placeholder">🌾</div>
                <div class="info">
                  <div class="name">内蒙古燕麦米 1kg</div>
                  <div class="spec">内蒙古·赤峰</div>
                  <div class="price-row">
                    <span class="price">¥15.8</span>
                    <button class="cart-add">+</button>
                  </div>
                </div>
              </a>
              <a href="product.html" class="product-card">
                <div class="img-placeholder">🌾</div>
                <div class="info">
                  <div class="name">山东石磨全麦粉 2.5kg</div>
                  <div class="spec">山东·潍坊</div>
                  <div class="price-row">
                    <span class="price">¥22.9</span>
                    <button class="cart-add">+</button>
                  </div>
                </div>
              </a>
              <a href="product.html" class="product-card">
                <div class="img-placeholder">🌾</div>
                <div class="info">
                  <div class="name">山西黄小米 1kg</div>
                  <div class="spec">山西·沁州</div>
                  <div class="price-row">
                    <span class="price">¥16.8</span>
                    <button class="cart-add">+</button>
                  </div>
                </div>
              </a>
              <a href="product.html" class="product-card">
                <div class="img-placeholder">🌾</div>
                <div class="info">
                  <div class="name">云南紫米 500g</div>
                  <div class="spec">云南·墨江</div>
                  <div class="price-row">
                    <span class="price">¥12.9</span>
                    <button class="cart-add">+</button>
                  </div>
                </div>
              </a>
              <a href="product.html" class="product-card">
                <div class="img-placeholder">🌾</div>
                <div class="info">
                  <div class="name">河南刀削面 1kg</div>
                  <div class="spec">河南·郑州</div>
                  <div class="price-row">
                    <span class="price">¥9.9</span>
                    <button class="cart-add">+</button>
                  </div>
                </div>
              </a>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-bar">
        <a href="home.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
          <span>首页</span>
        </a>
        <a href="category.html" class="tab-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>分类</span>
        </a>
        <a href="cart.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          <span class="badge">3</span>
          <span>购物车</span>
        </a>
        <a href="profile.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>我的</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    // 分类侧栏切换
    document.querySelectorAll('.cat-item').forEach(el => {
      el.addEventListener('click', function() {
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
      });
    });
    // 子分类切换
    document.querySelectorAll('.btn-outline').forEach(el => {
      el.addEventListener('click', function() {
        document.querySelectorAll('.btn-outline').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
