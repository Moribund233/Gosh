<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>谷穗 · 购物车</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .cart-item {
      display: flex;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      background: var(--surface);
      border-bottom: 1px solid var(--border-soft);
      align-items: center;
    }
    .cart-item .check {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cart-item .check.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .cart-item .check.checked::after {
      content: '';
      width: 8px; height: 4px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
    }
    .cart-item .thumb {
      width: 70px; height: 70px;
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .cart-item .thumb.rice { background: var(--accent-light); }
    .cart-item .thumb.mushroom { background: var(--warm-soft); }
    .cart-item .thumb.bean { background: #e8e8e0; }
    .cart-item .info {
      flex: 1;
      min-width: 0;
    }
    .cart-item .info .name {
      font-size: var(--fs-body);
      font-weight: 500;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cart-item .info .spec {
      font-size: var(--fs-small);
      color: var(--muted);
      margin-bottom: var(--sp-2);
    }
    .cart-item .info .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-item .info .row .price {
      font-family: var(--font-price);
      font-weight: 700;
      color: var(--price);
      font-size: var(--fs-price);
    }

    .cart-summary {
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border-soft);
      padding: var(--sp-3) var(--sp-4);
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }
    .cart-summary .all-check {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--fs-caption);
    }
    .cart-summary .total {
      flex: 1;
      text-align: right;
      font-size: var(--fs-caption);
      color: var(--fg-soft);
    }
    .cart-summary .total .amount {
      font-family: var(--font-price);
      font-size: 20px;
      font-weight: 700;
      color: var(--price);
    }
    .cart-summary .total .amount .sym { font-size: 14px; }
    .btn-checkout {
      padding: 11px var(--sp-6);
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius-full);
      font-size: var(--fs-body);
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-checkout:disabled { opacity: 0.4; }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page-container">
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="icons">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="5" width="14" height="14" rx="2"/><line x1="6" y1="10" x2="20" y2="10"/></svg>
        </div>
      </div>
      <div class="nav-bar">
        <a href="home.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="title">购物车</span>
        <span class="right-action" style="font-size:var(--fs-caption);color:var(--muted);">管理</span>
      </div>

      <div class="content">
        <!-- 商品列表 -->
        <div style="padding-top:var(--sp-2);">
          <div class="cart-item">
            <div class="check checked" data-idx="0"></div>
            <a href="product.html" class="thumb rice">🌾</a>
            <div class="info">
              <div class="name">东北五常稻花香大米 5kg</div>
              <div class="spec">5kg / 袋装</div>
              <div class="row">
                <span class="price">¥49.9</span>
                <div class="qty-selector">
                  <button class="qty-btn" data-dir="minus" data-idx="0">−</button>
                  <span class="qty-num">1</span>
                  <button class="qty-btn" data-dir="plus" data-idx="0">+</button>
                </div>
              </div>
            </div>
          </div>
          <div class="cart-item">
            <div class="check checked" data-idx="1"></div>
            <a href="product.html" class="thumb mushroom">🍄</a>
            <div class="info">
              <div class="name">云南高山香菇 250g</div>
              <div class="spec">250g / 袋装</div>
              <div class="row">
                <span class="price">¥35.0</span>
                <div class="qty-selector">
                  <button class="qty-btn" data-dir="minus" data-idx="1">−</button>
                  <span class="qty-num">2</span>
                  <button class="qty-btn" data-dir="plus" data-idx="1">+</button>
                </div>
              </div>
            </div>
          </div>
          <div class="cart-item">
            <div class="check" data-idx="2"></div>
            <a href="product.html" class="thumb bean">🫘</a>
            <div class="info">
              <div class="name">东北有机黑豆 500g</div>
              <div class="spec">500g / 袋装</div>
              <div class="row">
                <span class="price">¥8.9</span>
                <div class="qty-selector">
                  <button class="qty-btn" data-dir="minus" data-idx="2">−</button>
                  <span class="qty-num">1</span>
                  <button class="qty-btn" data-dir="plus" data-idx="2">+</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 结算栏 -->
      <div class="cart-summary">
        <div class="all-check" id="toggleAll">
          <div class="check checked" id="allCheck"></div>
          <span>全选</span>
        </div>
        <div class="total">
          合计：<span class="amount"><span class="sym">¥</span><span id="totalPrice">119.8</span></span>
        </div>
        <a href="checkout.html" class="btn-checkout" id="checkoutBtn">结算 (2)</a>
      </div>

      <div class="tab-bar">
        <a href="home.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
          <span>首页</span>
        </a>
        <a href="category.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>分类</span>
        </a>
        <a href="cart.html" class="tab-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          <span class="badge">3</span>
          <span>购物车</span>
        </a>
        <a href="profile.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>我的</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    // 选中/取消
    const items = document.querySelectorAll('.cart-item');
    const allCheck = document.getElementById('allCheck');

    function updateTotal() {
      let count = 0, total = 0;
      const prices = [49.9, 35.0, 8.9];
      const qtys = document.querySelectorAll('.qty-num');
      items.forEach((item, i) => {
        const check = item.querySelector('.check');
        if (check.classList.contains('checked')) {
          count++;
          total += prices[i] * parseInt(qtys[i].textContent);
        }
      });
      document.getElementById('totalPrice').textContent = total.toFixed(1);
      const btn = document.getElementById('checkoutBtn');
      btn.textContent = `结算 (${count})`;
      btn.href = count > 0 ? 'checkout.html' : 'javascript:void(0)';

      const allChecked = Array.from(items).every((item, i) => item.querySelector('.check').classList.contains('checked'));
      allCheck.classList.toggle('checked', allChecked);
    }

    items.forEach(item => {
      const check = item.querySelector('.check');
      check.addEventListener('click', function() {
        this.classList.toggle('checked');
        updateTotal();
      });
    });

    allCheck.addEventListener('click', function() {
      const checked = !this.classList.contains('checked');
      this.classList.toggle('checked', checked);
      items.forEach(item => item.querySelector('.check').classList.toggle('checked', checked));
      updateTotal();
    });

    // 数量增减
    document.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const display = this.parentElement.querySelector('.qty-num');
        let v = parseInt(display.textContent);
        if (this.dataset.dir === 'plus') { v++; }
        else if (v > 1) { v--; }
        display.textContent = v;
        updateTotal();
      });
    });

    updateTotal();
  </script>
</body>
</html>
