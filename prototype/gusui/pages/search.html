<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>谷穗 · 搜索</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="page-container">
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="icons">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="5" width="14" height="14" rx="2"/><line x1="6" y1="10" x2="20" y2="10"/></svg>
        </div>
      </div>

      <div class="nav-bar">
        <a href="home.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="title">搜索</span>
      </div>

      <div class="content">
        <!-- 搜索框 -->
        <div style="margin:var(--sp-3) var(--sp-4);">
          <div class="search-bar" style="margin:0;background:var(--surface);border:1px solid var(--accent);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--accent);"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>
            <input type="text" placeholder="搜索干杂货、产地、品牌…" style="flex:1;font-size:14px;color:var(--fg);background:transparent;border:none;outline:none;" />
          </div>
        </div>

        <!-- 热门搜索 -->
        <div style="padding:var(--sp-2) var(--sp-4);">
          <h3 style="font-size:var(--fs-caption);color:var(--fg-soft);font-weight:600;margin-bottom:var(--sp-3);">热门搜索</h3>
          <div style="display:flex;flex-wrap:wrap;gap:var(--sp-2);">
            <span class="btn-outline">五常大米</span>
            <span class="btn-outline">香菇</span>
            <span class="btn-outline">黑木耳</span>
            <span class="btn-outline">小米</span>
            <span class="btn-outline">红枣</span>
            <span class="btn-outline">枸杞</span>
            <span class="btn-outline">核桃</span>
            <span class="btn-outline">龙口粉丝</span>
            <span class="btn-outline">银耳</span>
            <span class="btn-outline">花椒</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 搜索历史 -->
        <div style="padding:var(--sp-3) var(--sp-4);">
          <div class="section-header" style="padding:0 0 var(--sp-2);">
            <h3 style="font-size:var(--fs-caption);color:var(--fg-soft);font-weight:600;">搜索历史</h3>
            <span class="more" style="font-size:var(--fs-caption);">清空</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:var(--sp-2);">
            <span class="btn-outline">有机大米</span>
            <span class="btn-outline">云南菌菇</span>
            <span class="btn-outline">新疆红枣</span>
            <span class="btn-outline">黑芝麻</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 搜索结果预览 -->
        <div class="section-header">
          <h2>你可能想找</h2>
        </div>
        <div style="padding:0 var(--sp-4) var(--sp-6);">
          <a href="product.html" style="display:flex;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--border-soft);">
            <div style="width:80px;height:80px;border-radius:var(--radius-md);background:var(--accent-light);display:grid;place-items:center;font-size:28px;flex-shrink:0;">🌾</div>
            <div style="flex:1;">
              <div style="font-size:var(--fs-body);font-weight:500;margin-bottom:4px;">东北五常稻花香大米 5kg</div>
              <div style="font-size:var(--fs-small);color:var(--muted);margin-bottom:6px;">产地：黑龙江·五常 | 月销 1.2万+</div>
              <div style="display:flex;align-items:center;gap:var(--sp-2);">
                <span class="price" style="font-size:var(--fs-price);font-weight:700;color:var(--price);">¥49.9</span>
                <span style="font-size:var(--fs-small);color:var(--muted);text-decoration:line-through;">¥69.0</span>
              </div>
            </div>
          </a>
          <a href="product.html" style="display:flex;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--border-soft);">
            <div style="width:80px;height:80px;border-radius:var(--radius-md);background:var(--warm-soft);display:grid;place-items:center;font-size:28px;flex-shrink:0;">🍄</div>
            <div style="flex:1;">
              <div style="font-size:var(--fs-body);font-weight:500;margin-bottom:4px;">云南高山香菇 250g</div>
              <div style="font-size:var(--fs-small);color:var(--muted);margin-bottom:6px;">产地：云南·楚雄 | 月销 8000+</div>
              <div style="display:flex;align-items:center;gap:var(--sp-2);">
                <span class="price" style="font-size:var(--fs-price);font-weight:700;color:var(--price);">¥35.0</span>
                <span style="font-size:var(--fs-small);color:var(--muted);text-decoration:line-through;">¥48.0</span>
              </div>
            </div>
          </a>
          <a href="product.html" style="display:flex;gap:var(--sp-3);padding:var(--sp-3) 0;">
            <div style="width:80px;height:80px;border-radius:var(--radius-md);background:var(--accent-light);display:grid;place-items:center;font-size:28px;flex-shrink:0;">🫘</div>
            <div style="flex:1;">
              <div style="font-size:var(--fs-body);font-weight:500;margin-bottom:4px;">东北有机黑豆 500g</div>
              <div style="font-size:var(--fs-small);color:var(--muted);margin-bottom:6px;">产地：黑龙江·绥化 | 月销 6800+</div>
              <div style="display:flex;align-items:center;gap:var(--sp-2);">
                <span class="price" style="font-size:var(--fs-price);font-weight:700;color:var(--price);">¥8.9</span>
              </div>
            </div>
          </a>
        </div>
      </div>

      <div class="tab-bar">
        <a href="home.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
          <span>首页</span>
        </a>
        <a href="category.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>分类</span>
        </a>
        <a href="cart.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          <span class="badge">3</span>
          <span>购物车</span>
        </a>
        <a href="profile.html" class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>我的</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
