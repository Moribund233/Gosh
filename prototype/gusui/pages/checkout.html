<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>谷穗 · 确认订单</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .checkout-section { background: var(--surface); padding: var(--sp-4); border-bottom: 8px solid var(--bg); }
    .checkout-section:last-of-type { border-bottom: none; }
    .checkout-section .sec-title {
      font-size: var(--fs-caption);
      color: var(--fg-soft);
      font-weight: 500;
      margin-bottom: var(--sp-3);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    .address-card {
      display: flex;
      align-items: flex-start;
      gap: var(--sp-3);
    }
    .address-card .icon {
      width: 36px; height: 36px;
      background: var(--accent-light);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--accent);
      flex-shrink: 0;
    }
    .address-card .info { flex: 1; }
    .address-card .info .name-row {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: 4px;
    }
    .address-card .info .name-row .name { font-weight: 600; font-size: var(--fs-body); }
    .address-card .info .name-row .phone { color: var(--muted); font-size: var(--fs-caption); }
    .address-card .info .addr { font-size: var(--fs-caption); color: var(--fg-soft); line-height: 1.4; }

    .checkout-item {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) 0;
    }
    .checkout-item .thumb {
      width: 50px; height: 50px;
      border-radius: var(--radius-sm);
      display: grid; place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .checkout-item .info { flex: 1; display: flex; align-items: center; }
    .checkout-item .info .name { flex: 1; font-size: var(--fs-body); }
    .checkout-item .info .qty { color: var(--muted); font-size: var(--fs-caption); margin-right: var(--sp-3); }
    .checkout-item .info .price { font-weight: 600; color: var(--price); font-size: var(--fs-body); }

    .fee-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--sp-2) 0;
      font-size: var(--fs-body);
    }
    .fee-row .label { color: var(--fg-soft); }
    .fee-row .value { font-weight: 500; }

    .payment-opt {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) 0;
    }
    .payment-opt .radio {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .payment-opt .radio.selected {
      border-color: var(--accent);
    }
    .payment-opt .radio.selected::after {
      content: '';
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }
    .payment-opt .pay-icon { font-size: 20px; width: 28px; text-align: center; }
    .payment-opt .pay-name { flex: 1; font-size: var(--fs-body); }

    .bottom-checkout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3) var(--sp-4);
      background: var(--surface);
      border-top: 1px solid var(--border-soft);
    }
    .bottom-checkout .total-label { font-size: var(--fs-caption); color: var(--fg-soft); }
    .bottom-checkout .total-amount {
      font-family: var(--font-price);
      font-size: 22px;
      font-weight: 700;
      color: var(--price);
    }
    .bottom-checkout .total-amount .sym { font-size: 14px; }
    .btn-submit {
      padding: 11px var(--sp-8);
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius-full);
      font-size: var(--fs-body);
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-submit:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page-container">
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="icons">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="5" width="14" height="14" rx="2"/><line x1="6" y1="10" x2="20" y2="10"/></svg>
        </div>
      </div>
      <div class="nav-bar">
        <a href="cart.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <span class="title">确认订单</span>
      </div>

      <div class="content">
        <!-- 收货地址 -->
        <div class="checkout-section">
          <div class="address-card">
            <div class="icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div class="info">
              <div class="name-row">
                <span class="name">李明</span>
                <span class="phone">138****5678</span>
                <span style="margin-left:auto;color:var(--muted);font-size:var(--fs-small);">更换 &gt;</span>
              </div>
              <div class="addr">北京市朝阳区建国路88号 华贸中心写字楼1座 15层</div>
            </div>
          </div>
        </div>

        <!-- 商品明细 -->
        <div class="checkout-section">
          <div class="sec-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            谷穗优选 · 共2件商品
          </div>
          <div class="checkout-item">
            <div class="thumb" style="background:var(--accent-light);">🌾</div>
            <div class="info">
              <span class="name">东北五常稻花香大米 5kg</span>
              <span class="qty">×1</span>
              <span class="price">¥49.9</span>
            </div>
          </div>
          <div class="checkout-item">
            <div class="thumb" style="background:var(--warm-soft);">🍄</div>
            <div class="info">
              <span class="name">云南高山香菇 250g</span>
              <span class="qty">×2</span>
              <span class="price">¥70.0</span>
            </div>
          </div>
        </div>

        <!-- 优惠券 -->
        <div class="checkout-section" style="border-bottom:1px solid var(--border-soft);">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:var(--fs-body);">优惠券</span>
            <span style="font-size:var(--fs-caption);color:var(--accent);font-weight:500;">选择优惠券 &gt;</span>
          </div>
        </div>

        <!-- 费用明细 -->
        <div class="checkout-section" style="border-bottom:1px solid var(--border-soft);padding-top:var(--sp-2);padding-bottom:var(--sp-2);">
          <div class="fee-row">
            <span class="label">商品小计</span>
            <span class="value">¥119.9</span>
          </div>
          <div class="fee-row">
            <span class="label">运费</span>
            <span class="value" style="color:var(--accent);">免运费</span>
          </div>
          <div class="fee-row">
            <span class="label">优惠券</span>
            <span class="value" style="color:var(--price);">−¥10.0</span>
          </div>
        </div>

        <!-- 支付方式 -->
        <div class="checkout-section" style="padding-bottom:var(--sp-6);">
          <div class="sec-title">支付方式</div>
          <div class="payment-opt">
            <div class="radio selected"></div>
            <span class="pay-icon">💚</span>
            <span class="pay-name">微信支付</span>
          </div>
        </div>
      </div>

      <!-- 底部结算 -->
      <div class="bottom-checkout">
        <div>
          <div class="total-label">实付金额</div>
          <div class="total-amount"><span class="sym">¥</span>109.9</div>
        </div>
        <button class="btn-submit" onclick="submitOrder()">提交订单</button>
      </div>
    </div>
  </div>

  <script>
    function submitOrder() {
      const btn = document.querySelector('.btn-submit');
      btn.textContent = '提交中…';
      btn.disabled = true;
      setTimeout(() => {
        window.location.href = 'orders.html';
      }, 1000);
    }
  </script>
</body>
</html>
