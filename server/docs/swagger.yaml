      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
