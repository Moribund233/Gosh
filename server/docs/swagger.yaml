basePath: /api/v1
definitions:
  gosh_internal_dto_request.AddBrowseHistoryRequest:
    properties:
      product_id:
        type: integer
    required:
    - product_id
    type: object
  gosh_internal_dto_request.AddCartRequest:
    properties:
      quantity:
        minimum: 1
        type: integer
      sku_id:
        type: integer
    required:
    - quantity
    - sku_id
    type: object
  gosh_internal_dto_request.AddFavoriteRequest:
    properties:
      product_id:
        type: integer
    required:
    - product_id
    type: object
  gosh_internal_dto_request.ApplyMerchantRequest:
    properties:
      contact_name:
        maxLength: 32
        type: string
      contact_phone:
        type: string
      shop_desc:
        maxLength: 512
        type: string
      shop_name:
        maxLength: 64
        type: string
    required:
    - contact_name
    - contact_phone
    - shop_name
    type: object
  gosh_internal_dto_request.ApplyPointsRequest:
    properties:
      points:
        minimum: 1
        type: integer
    required:
    - points
    type: object
  gosh_internal_dto_request.CalculateCouponRequest:
    properties:
      coupon_id:
        type: integer
      order_amount:
        minimum: 0
        type: integer
    required:
    - coupon_id
    - order_amount
    type: object
  gosh_internal_dto_request.CancelOrderRequest:
    properties:
      reason:
        maxLength: 128
        type: string
    type: object
  gosh_internal_dto_request.CreateAddressRequest:
    properties:
      city:
        maxLength: 32
        type: string
      detail:
        maxLength: 256
        type: string
      district:
        maxLength: 32
        type: string
      is_default:
        type: boolean
      name:
        maxLength: 32
        type: string
      phone:
        type: string
      province:
        maxLength: 32
        type: string
    required:
    - city
    - detail
    - district
    - name
    - phone
    - province
    type: object
  gosh_internal_dto_request.CreateBannerRequest:
    properties:
      background:
        maxLength: 128
        type: string
      description:
        maxLength: 256
        type: string
      image:
        maxLength: 256
        type: string
      link:
        maxLength: 256
        type: string
      sort_order:
        type: integer
      subtitle:
        maxLength: 128
        type: string
      title:
        maxLength: 64
        type: string
    type: object
  gosh_internal_dto_request.CreateCategoryRequest:
    properties:
      banner:
        maxLength: 256
        type: string
      icon:
        maxLength: 32
        type: string
      name:
        maxLength: 32
        type: string
      parent_id:
        type: integer
      sort_order:
        type: integer
    required:
    - name
    type: object
  gosh_internal_dto_request.CreateCouponRequest:
    properties:
      condition:
        minimum: 0
        type: integer
      discount:
        minimum: 1
        type: integer
      end_at:
        type: string
      name:
        maxLength: 64
        type: string
      per_limit:
        minimum: 1
        type: integer
      start_at:
        type: string
      total_count:
        minimum: 0
        type: integer
      type:
        enum:
        - full_reduce
        - discount
        type: string
    required:
    - condition
    - discount
    - end_at
    - name
    - start_at
    - type
    type: object
  gosh_internal_dto_request.CreateOrderRequest:
    properties:
      address_id:
        type: integer
      delivery_method:
        enum:
        - standard
        - express
        type: string
      remark:
        maxLength: 200
        type: string
    type: object
  gosh_internal_dto_request.CreateProductRequest:
    properties:
      brand:
        maxLength: 64
        type: string
      category_id:
        type: integer
      description:
        type: string
      images:
        type: string
      is_featured:
        type: boolean
      is_hot:
        type: boolean
      is_new:
        type: boolean
      name:
        maxLength: 128
        type: string
      origin:
        maxLength: 128
        type: string
      original_price:
        minimum: 0
        type: integer
      price:
        minimum: 0
        type: integer
      shelf_life:
        maxLength: 64
        type: string
      skus:
        items:
          $ref: '#/definitions/gosh_internal_dto_request.CreateSKUReq'
        type: array
      subtitle:
        maxLength: 256
        type: string
      tags:
        maxLength: 256
        type: string
    required:
    - category_id
    - name
    - price
    type: object
  gosh_internal_dto_request.CreateReviewRequest:
    properties:
      content:
        maxLength: 500
        type: string
      images:
        type: string
      product_id:
        type: integer
      score:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - product_id
    - score
    type: object
  gosh_internal_dto_request.CreateSKUReq:
    properties:
      name:
        maxLength: 64
        type: string
      price:
        minimum: 0
        type: integer
      stock:
        minimum: 0
        type: integer
    required:
    - name
    - price
    type: object
  gosh_internal_dto_request.LoginRequest:
    properties:
      password:
        type: string
      phone:
        type: string
    required:
    - password
    - phone
    type: object
  gosh_internal_dto_request.MergeCartRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/gosh_internal_dto_request.MergeItem'
        type: array
    required:
    - items
    type: object
  gosh_internal_dto_request.MergeItem:
    properties:
      quantity:
        minimum: 1
        type: integer
      sku_id:
        type: integer
    required:
    - quantity
    - sku_id
    type: object
  gosh_internal_dto_request.PayRequest:
    properties:
      method:
        enum:
        - mock
        - wechat
        - alipay
        type: string
      order_no:
        type: string
    required:
    - method
    - order_no
    type: object
  gosh_internal_dto_request.RefundRequest:
    properties:
      amount:
        minimum: 0
        type: integer
      reason:
        maxLength: 256
        type: string
      transaction_no:
        type: string
    required:
    - amount
    - transaction_no
    type: object
  gosh_internal_dto_request.RegisterRequest:
    properties:
      nickname:
        maxLength: 32
        type: string
      password:
        maxLength: 32
        minLength: 6
        type: string
      phone:
        type: string
    required:
    - nickname
    - password
    - phone
    type: object
  gosh_internal_dto_request.ReviewMerchantRequest:
    properties:
      action:
        enum:
        - approve
        - reject
        type: string
      application_id:
        type: integer
      remark:
        maxLength: 256
        type: string
    required:
    - action
    - application_id
    type: object
  gosh_internal_dto_request.SelectRequest:
    properties:
      all:
        description: true=全选 false=取消全选
        type: boolean
      select:
        description: true=选中 false=取消选中
        type: boolean
      sku_ids:
        description: 空列表=全选/全不选
        items:
          type: integer
        type: array
    type: object
  gosh_internal_dto_request.UpdateAddressRequest:
    properties:
      city:
        maxLength: 32
        type: string
      detail:
        maxLength: 256
        type: string
      district:
        maxLength: 32
        type: string
      is_default:
        type: boolean
      name:
        maxLength: 32
        type: string
      phone:
        type: string
      province:
        maxLength: 32
        type: string
    type: object
  gosh_internal_dto_request.UpdateBannerRequest:
    properties:
      background:
        maxLength: 128
        type: string
      description:
        maxLength: 256
        type: string
      image:
        maxLength: 256
        type: string
      link:
        maxLength: 256
        type: string
      sort_order:
        type: integer
      status:
        enum:
        - "on"
        - "off"
        type: string
      subtitle:
        maxLength: 128
        type: string
      title:
        maxLength: 64
        type: string
    type: object
  gosh_internal_dto_request.UpdateBrandStoryRequest:
    properties:
      badge:
        maxLength: 32
        type: string
      description:
        maxLength: 256
        type: string
      link:
        maxLength: 256
        type: string
      logo:
        maxLength: 256
        type: string
      title:
        maxLength: 64
        type: string
    type: object
  gosh_internal_dto_request.UpdateCartRequest:
    properties:
      quantity:
        minimum: 1
        type: integer
      selected:
        type: boolean
    required:
    - quantity
    type: object
  gosh_internal_dto_request.UpdateCategoryRequest:
    properties:
      banner:
        maxLength: 256
        type: string
      icon:
        maxLength: 32
        type: string
      name:
        maxLength: 32
        type: string
      sort_order:
        type: integer
    type: object
  gosh_internal_dto_request.UpdateProductRequest:
    properties:
      brand:
        maxLength: 64
        type: string
      category_id:
        type: integer
      description:
        type: string
      images:
        type: string
      is_featured:
        type: boolean
      is_hot:
        type: boolean
      is_new:
        type: boolean
      name:
        maxLength: 128
        type: string
      origin:
        maxLength: 128
        type: string
      original_price:
        type: integer
      price:
        type: integer
      shelf_life:
        maxLength: 64
        type: string
      status:
        enum:
        - "on"
        - "off"
        type: string
      subtitle:
        maxLength: 256
        type: string
      tags:
        maxLength: 256
        type: string
    type: object
  gosh_internal_dto_request.UpdateProfileRequest:
    properties:
      avatar:
        maxLength: 256
        type: string
      nickname:
        maxLength: 32
        type: string
    type: object
  gosh_internal_dto_request.UpdateUserRoleRequest:
    properties:
      role:
        enum:
        - user
        - merchant
        - support
        - operator
        - super_admin
        type: string
      user_id:
        type: integer
    required:
    - role
    - user_id
    type: object
  gosh_pkg_response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:9292
info:
  contact:
    email: support@gosh-mall.com
    name: API Support
  description: Gosh Mall is a full-stack e-commerce platform with user management,
    product catalog, shopping cart, order processing, payment, coupons, and admin
    features.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Gosh Mall API
  version: "1.0"
paths:
  /addresses:
    get:
      consumes:
      - application/json
      description: Get all addresses for current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: List user addresses
      tags:
      - Addresses
    post:
      consumes:
      - application/json
      description: Create a new shipping address
      parameters:
      - description: Address info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gosh_internal_dto_request.CreateAddressRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Create a new address
      tags:
      - Addresses
  /addresses/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a shipping address by ID
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Delete an address
      tags:
      - Addresses
    put:
      consumes:
      - application/json
      description: Update a shipping address by ID
      parameters:
      - description: Address ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated address info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gosh_internal_dto_request.UpdateAddressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Update an address
      tags:
      - Addresses
  /admin/banners:
    get:
      consumes:
      - application/json
      description: Admin lists all banners
      parameters:
      - description: Status filter
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: List all banners
