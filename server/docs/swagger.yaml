        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Update a category
      tags:
      - Categories
  /admin/merchant/applications:
    get:
      consumes:
      - application/json
      description: Admin lists all merchant applications
      parameters:
      - description: Application status filter
        in: query
        name: status
        type: string
      - description: Page number
        in: query
