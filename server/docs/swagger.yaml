  /admin/users:
    get:
      consumes:
      - application/json
      description: List users filtered by role (super admin only)
      parameters:
      - description: Role filter
        in: query
        name: role
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {list: []gosh/internal/dto/response.UserResponse, total:
            int64}'
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: List users by role
      tags:
      - Users
  /admin/users/role:
    put:
      consumes:
      - application/json
      description: Update a user's role (super admin only)
      parameters:
      - description: User ID and new role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gosh_internal_dto_request.UpdateUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Update user role
      tags:
      - Users
  /banners:
    get:
      consumes:
      - application/json
      description: Get all active banners for public display
      produces:
      - application/json
      responses:
        "200":
