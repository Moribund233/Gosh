  /admin/categories:
    post:
      consumes:
      - application/json
      description: Create a new category
      parameters:
      - description: Category info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gosh_internal_dto_request.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Create a category
      tags:
      - Categories
  /admin/categories/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a category by ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Delete a category
      tags:
      - Categories
    put:
      consumes:
      - application/json
      description: Update an existing category
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Category update info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gosh_internal_dto_request.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
