      description: Admin creates a new banner
      parameters:
      - description: Banner info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gosh_internal_dto_request.CreateBannerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Create a banner
      tags:
      - Banners
  /admin/banners/{id}:
    delete:
      consumes:
      - application/json
      description: Admin deletes a banner
      parameters:
      - description: Banner ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Delete a banner
      tags:
      - Banners
    put:
      consumes:
      - application/json
      description: Admin updates a banner
      parameters:
      - description: Banner ID
        in: path
        name: id
        required: true
        type: integer
      - description: Banner update info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gosh_internal_dto_request.UpdateBannerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gosh_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Update a banner
      tags:
      - Banners
  /admin/brand-story:
    put:
      consumes:
      - application/json
      description: Admin updates the brand story
      parameters:
      - description: Brand story info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gosh_internal_dto_request.UpdateBrandStoryRequest'
      produces:
