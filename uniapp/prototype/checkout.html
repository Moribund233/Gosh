<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=393, initial-scale=1, maximum-scale=1">
<title>结算 — 暖食集</title>
<link rel="stylesheet" href="css/wechat-shop.css">
<style>
.section-title {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--muted);
  padding: var(--space-3) var(--space-4) var(--space-2);
}

.address-card {
  background: var(--surface);
  padding: var(--space-4);
  display: flex;
  align-items: center;
  gap: var(--space-3);
}
.address-card .icon {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent-light);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); flex-shrink: 0;
}
.address-card .info { flex: 1; }
.address-card .info .name {
  font-weight: 600; font-size: var(--text-base);
}
.address-card .info .detail {
  font-size: var(--text-sm); color: var(--muted); margin-top: 2px;
}
.address-card .arrow { color: var(--meta); }

.checkout-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  animation: fadeInUp 0.3s ease both;
}
.checkout-item .thumb {
  width: 56px; height: 56px; border-radius: var(--radius-md);
  background: #F8F8F8; display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.checkout-item .detail { flex: 1; }
.checkout-item .detail .name { font-size: var(--text-sm); font-weight: 500; }
.checkout-item .detail .spec { font-size: var(--text-xs); color: var(--muted); }
.checkout-item .right { text-align: right; }
.checkout-item .right .price { font-size: var(--text-base); font-weight: 700; color: var(--price-red); }
.checkout-item .right .qty { font-size: var(--text-xs); color: var(--muted); }

.order-summary {
  background: var(--surface);
  padding: var(--space-3) var(--space-4);
  margin-top: var(--space-2);
}
.summary-row {
  display: flex; justify-content: space-between;
  padding: var(--space-1) 0;
  font-size: var(--text-sm);
}
.summary-row.total {
  font-weight: 700; font-size: var(--text-base);
  border-top: 1px solid var(--border);
  padding-top: var(--space-2);
  margin-top: var(--space-1);
}
.summary-row.total .amount { color: var(--price-red); font-size: 22px; }
.summary-row.total .amount .unit { font-size: 14px; }

.pay-methods {
  background: var(--surface);
  padding: 0;
  margin-top: var(--space-2);
}
.pay-method {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border);
}
.pay-method .radio {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pay-method .radio.active { border-color: var(--accent); }
.pay-method .radio.active::after {
  content: ''; width: 10px; height: 10px;
  border-radius: 50%; background: var(--accent);
}
.pay-method .icon { font-size: 20px; }
.pay-method .name { flex: 1; font-size: var(--text-sm); }
.pay-method .badge {
  font-size: 10px; color: var(--accent);
  background: var(--accent-light);
  padding: 1px 4px; border-radius: 3px;
}

/* 备注 */
.remark-row {
  background: var(--surface);
  padding: var(--space-3) var(--space-4);
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-sm);
}
.remark-row input {
  flex: 1; border: none; background: none;
  font-size: var(--text-sm); color: var(--fg);
}
.remark-row input::placeholder { color: var(--meta); }

/* 底部提交 */
.submit-bar {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: 64px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 var(--space-4);
  gap: var(--space-3);
  z-index: 50;
}
.submit-bar .total-text { flex: 1; text-align: right; font-size: var(--text-sm); }
.submit-bar .total-text .amount { font-size: 24px; font-weight: 700; color: var(--price-red); }
.submit-bar .total-text .amount .unit { font-size: 14px; }
.submit-bar .btn-submit {
  background: linear-gradient(135deg, var(--accent), var(--gold));
  color: #fff;
  border-radius: var(--radius-pill);
  padding: 12px var(--space-8);
  font-size: var(--text-lg);
  font-weight: 500;
  white-space: nowrap;
  transition: transform var(--motion-fast), box-shadow var(--motion-fast);
}
.submit-bar .btn-submit:active { transform: scale(0.96); box-shadow: 0 4px 16px rgba(139,94,60,0.3); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="dynamic-island"><span class="cam"></span></div>
  <div class="status-bar">
    <span class="time">9:41</span>
    <span class="icons">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 9l4 4-4 4"/><path d="M7 17h10l4-4-4-4H7"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </span>
  </div>

  <div class="nav-bar">
    <div class="back" onclick="history.back()">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="title">确认订单</div>
    <div class="action" style="width:auto"></div>
  </div>

  <div class="page-content" style="padding-bottom:64px">
    <!-- 收货地址 -->
    <div class="address-card" onclick="showToast('选择地址')">
      <div class="icon">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
      </div>
      <div class="info">
        <div class="name">张女士 · 138****5678</div>
        <div class="detail">北京市朝阳区建国路 88 号 SOHO 现代城 A 座 1508</div>
      </div>
      <span class="arrow">›</span>
    </div>

    <!-- 商品列表 -->
    <div class="section-title">暖食集 · 官方旗舰店</div>
    <div id="checkoutItems"></div>

    <!-- 备注 -->
    <div class="remark-row">
      <span style="color:var(--muted);flex-shrink:0">备注</span>
      <input placeholder="如有特殊要求请在此备注" maxlength="50">
    </div>

    <!-- 配送方式 -->
    <div class="address-card" style="margin-top:var(--space-2)" onclick="showToast('选择配送方式')">
      <div class="icon" style="background:#E8F5E9;color:#2E7D32">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/></svg>
      </div>
      <div class="info">
        <div class="name">标准配送</div>
        <div class="detail">满 99 免运费 · 预计明天 18:00 前送达</div>
      </div>
      <span class="arrow">›</span>
    </div>

    <!-- 优惠 -->
    <div class="address-card" style="margin-top:var(--space-2)" onclick="showToast('选择优惠券')">
      <div class="icon" style="background:#FFF3E0;color:#E65100">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/><path d="M6 6h.008v.008H6V6z"/></svg>
      </div>
      <div class="info">
        <div class="name">优惠券</div>
        <div class="detail" style="color:var(--accent)">2 张可用 · 满 99 减 20</div>
      </div>
      <span class="arrow">›</span>
    </div>

    <!-- 支付方式 -->
    <div class="section-title" style="margin-top:var(--space-2)">支付方式</div>
    <div class="pay-methods">
      <div class="pay-method" onclick="selectPay(this)">
        <div class="radio active"></div>
        <span class="icon">💳</span>
        <span class="name">微信支付</span>
        <span class="badge">推荐</span>
      </div>
      <div class="pay-method" onclick="selectPay(this)">
        <div class="radio"></div>
        <span class="icon">🏦</span>
        <span class="name">银行卡支付</span>
      </div>
    </div>

    <!-- 订单汇总 -->
    <div class="order-summary">
      <div class="summary-row"><span>商品小计</span><span>¥105.7</span></div>
      <div class="summary-row"><span>运费</span><span>¥0.00</span></div>
      <div class="summary-row"><span>优惠券</span><span style="color:var(--accent)">-¥20.00</span></div>
      <div class="summary-row total">
        <span>合计</span>
        <span class="amount"><span class="unit">¥</span>85.7</span>
      </div>
    </div>
  </div>

  <!-- 提交 -->
  <div class="submit-bar">
    <div class="total-text">
      合计：<span class="amount"><span class="unit">¥</span>85.7</span>
    </div>
    <button class="btn-submit" onclick="showToast('下单成功！');setTimeout(()=>location.href='orders.html',1500)">提交订单</button>
  </div>

  <div class="home-indicator"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const items = [
  { emoji: '🍚', name: '有机五常大米 5kg', spec: '5kg/袋', price: 49.9, qty: 1 },
  { emoji: '🥩', name: '黑猪肉脯 200g', spec: '200g/袋', price: 32.9, qty: 2 },
  { emoji: '🍪', name: '手工芝麻核桃糕 250g', spec: '250g/盒', price: 22.9, qty: 1 },
];

const container = document.getElementById('checkoutItems');
items.forEach(item => {
  const div = document.createElement('div');
  div.className = 'checkout-item';
  div.innerHTML = `
    <div class="thumb">${item.emoji}</div>
    <div class="detail">
      <div class="name">${item.name}</div>
      <div class="spec">${item.spec}</div>
    </div>
    <div class="right">
      <div class="price">¥${item.price}</div>
      <div class="qty">×${item.qty}</div>
    </div>
  `;
  container.appendChild(div);
});

function selectPay(el) {
  document.querySelectorAll('.pay-method .radio').forEach(r => r.classList.remove('active'));
  el.querySelector('.radio').classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
