<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=393, initial-scale=1, maximum-scale=1">
<title>商品分类 — 暖食集</title>
<link rel="stylesheet" href="css/wechat-shop.css">
<style>
.cat-layout {
  display: flex;
  height: 100%;
}
.cat-sidebar {
  width: 90px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
}
.cat-sidebar::-webkit-scrollbar { display: none; }
.cat-sidebar-item {
  padding: 14px 8px;
  text-align: center;
  font-size: var(--text-sm);
  color: var(--muted);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all var(--motion-fast);
}
.cat-sidebar-item.active {
  color: var(--accent);
  background: var(--accent-light);
  border-left-color: var(--accent);
  font-weight: 600;
}
.cat-main {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-3) var(--space-3) 80px;
  background: var(--bg);
}
.cat-main::-webkit-scrollbar { display: none; }
.cat-banner {
  border-radius: var(--radius-md);
  height: 80px;
  background: linear-gradient(135deg, #8B5E3C, #C9A96E);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-4);
  margin-bottom: var(--space-3);
  color: #fff;
  font-size: var(--text-sm);
  font-weight: 500;
}
.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3);
}
.cat-grid-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: var(--space-3) var(--space-2);
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  font-size: var(--text-sm);
  transition: transform var(--motion-fast), box-shadow var(--motion-fast);
}
.cat-grid-item:active {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.cat-grid-item .emoji { font-size: 32px; }
.cat-grid-item .name { font-weight: 500; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="dynamic-island"><span class="cam"></span></div>
  <div class="status-bar">
    <span class="time">9:41</span>
    <span class="icons">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 9l4 4-4 4"/><path d="M7 17h10l4-4-4-4H7"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </span>
  </div>
  <div class="page-content" style="padding-bottom:0">
    <div class="cat-layout">
      <div class="cat-sidebar">
        <div class="cat-sidebar-item active">推荐分类</div>
        <div class="cat-sidebar-item">方便速食</div>
        <div class="cat-sidebar-item">新鲜水果</div>
        <div class="cat-sidebar-item">肉禽蛋品</div>
        <div class="cat-sidebar-item">零食糕点</div>
        <div class="cat-sidebar-item">乳品烘培</div>
        <div class="cat-sidebar-item">茶饮酒水</div>
        <div class="cat-sidebar-item">粮油调味</div>
        <div class="cat-sidebar-item">冷冻生鲜</div>
        <div class="cat-sidebar-item">健康轻食</div>
      </div>
      <div class="cat-main">
        <div class="cat-banner">
          <span style="font-size:28px">🔥</span>
          <span>限时秒杀专区 · 低至 5 折</span>
        </div>
        <div class="cat-grid" id="catGrid"></div>
      </div>
    </div>
  </div>
  <div class="home-indicator"></div>
</div>

<script>
const items = [
  ['🍜', '方便面', '酸辣粉', '螺蛳粉', '速食粥', '自热火锅', '速食汤'],
  ['🍎', '苹果', '柑橘', '香蕉', '草莓', '蓝莓', '芒果'],
  ['🥩', '鲜猪肉', '鲜牛肉', '鸡胸肉', '鸭肉', '鸡蛋', '腊味'],
  ['🍪', '饼干', '膨化', '坚果', '巧克力', '肉干', '果冻'],
  ['🥛', '鲜牛奶', '酸奶', '芝士', '黄油', '淡奶油', '植物奶'],
  ['🧃', '果汁', '茶饮', '咖啡', '气泡水', '矿泉水', '酒类'],
  ['🫘', '大米', '面粉', '食用油', '酱油', '醋', '香料'],
  ['🦐', '速冻水饺', '虾仁', '鱼片', '牛排', '薯条', '冰淇淋'],
  ['🥗', '沙拉', '鸡胸肉', '杂粮', '代餐', '坚果酱', '蛋白棒'],
];

const grid = document.getElementById('catGrid');
items.flat().forEach((item, i) => {
  if (i % 6 === 0) {
    // skip the emoji header, it's handled below
  }
});
// Proper rendering
items.forEach(group => {
  const emoji = group[0];
  group.slice(1).forEach(name => {
    const div = document.createElement('div');
    div.className = 'cat-grid-item';
    div.innerHTML = `<span class="emoji">${emoji}</span><span class="name">${name}</span>`;
    div.onclick = () => { location.href = 'product-detail.html'; };
    grid.appendChild(div);
  });
});
</script>
</body>
</html>
