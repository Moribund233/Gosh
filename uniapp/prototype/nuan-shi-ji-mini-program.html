
<!doctype html>
<html lang="zh-CN">

<title>暖食集 — 微信小程序商城</title>
<link rel="stylesheet" href="css/wechat-shop.css">
<style>
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .launcher { max-width: 900px; padding: 40px 24px; text-align: center; }
  .launcher h1 { font-size: 28px; color: #fff; margin-bottom: 8px; }
  .launcher p { color: #888; margin-bottom: 32px; font-size: 14px; }
  .screen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .screen-card {
    background: #1e1e1e; border-radius: 12px; padding: 16px 12px; text-align: center;
    color: #ccc; font-size: 13px; transition: background 0.2s;
  }
  .screen-card:hover { background: #2a2a2a; }
  .screen-card .thumb {
    width: 56px; height: 56px; border-radius: 12px; margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #D97757 0%, #E8876A 100%);
  }
  .screen-card .thumb svg { width: 28px; height: 28px; color: #fff; }
  .screen-card .label { font-weight: 500; color: #fff; }
  .screen-card .count { font-size: 11px; color: #666; margin-top: 4px; }
  .launcher .note { margin-top: 32px; font-size: 12px; color: #555; }
  .launcher .note a { color: #D97757; }
</style>
</head>
