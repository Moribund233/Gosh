<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=393, initial-scale=1, maximum-scale=1">
<title>个人中心 — 暖食集</title>
<link rel="stylesheet" href="css/wechat-shop.css">
<style>
.profile-header {
  background: linear-gradient(135deg, #8B5E3C 0%, #A0704E 100%);
  padding: 40px var(--space-4) var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-4);
  color: #fff;
}
.profile-header .avatar-lg {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.5);
}
.profile-header .info { flex: 1; }
.profile-header .info .name { font-size: 20px; font-weight: 700; }
.profile-header .info .desc { font-size: 13px; opacity: 0.8; margin-top: 2px; }
.profile-header .arrow { color: rgba(255,255,255,0.6); }

.order-stats {
  display: flex;
  background: var(--surface);
  padding: var(--space-4) 0;
  margin-top: -16px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  position: relative;
  z-index: 1;
}
.order-stat-item {
  flex: 1;
  text-align: center;
  cursor: pointer;
}
.order-stat-item .num { font-size: 20px; font-weight: 700; }
.order-stat-item .label { font-size: 11px; color: var(--muted); margin-top: 2px; }

.menu-group {
  background: var(--surface);
  margin-top: var(--space-3);
  border-radius: var(--radius-lg);
  margin-left: var(--space-4);
  margin-right: var(--space-4);
  overflow: hidden;
}
.menu-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border);
  font-size: var(--text-sm);
}
.menu-item:last-child { border-bottom: none; }
.menu-item .icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.menu-item .label { flex: 1; }
.menu-item .value { color: var(--muted); font-size: var(--text-xs); }
.menu-item .arrow { color: var(--meta); }

.tool-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-3);
  padding: var(--space-4);
  background: var(--surface);
  margin-top: var(--space-3);
  margin-left: var(--space-4);
  margin-right: var(--space-4);
  border-radius: var(--radius-lg);
}
.tool-grid-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--fg);
  cursor: pointer;
}
.tool-grid-item .icon {
  width: 40px; height: 40px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="dynamic-island"><span class="cam"></span></div>
  <div class="status-bar" style="color:#fff">
    <span class="time">9:41</span>
    <span class="icons">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 9l4 4-4 4"/><path d="M7 17h10l4-4-4-4H7"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </span>
  </div>

  <div class="page-content">
    <!-- 头部 -->
    <div class="profile-header">
      <div class="avatar-lg">👤</div>
      <div class="info">
        <div class="name">暖食集用户</div>
        <div class="desc">微信号：nuanshiji</div>
      </div>
      <span class="arrow">›</span>
    </div>

    <!-- 订单统计 -->
    <div class="order-stats" onclick="location.href='orders.html'">
      <div class="order-stat-item">
        <div class="num">0</div>
        <div class="label">待付款</div>
      </div>
      <div class="order-stat-item">
        <div class="num">1</div>
        <div class="label">待发货</div>
      </div>
      <div class="order-stat-item">
        <div class="num">1</div>
        <div class="label">待收货</div>
      </div>
      <div class="order-stat-item">
        <div class="num">12</div>
        <div class="label">已完成</div>
      </div>
      <div class="order-stat-item">
        <div class="num">2</div>
        <div class="label">售后</div>
      </div>
    </div>

    <!-- 工具 -->
    <div class="tool-grid">
      <div class="tool-grid-item">
        <div class="icon" style="background:var(--accent-light)">📍</div>
        <span>收货地址</span>
      </div>
      <div class="tool-grid-item">
        <div class="icon" style="background:#E8F5E9">💳</div>
        <span>优惠券</span>
      </div>
      <div class="tool-grid-item">
        <div class="icon" style="background:#E3F2FD">⭐</div>
        <span>收藏夹</span>
      </div>
      <div class="tool-grid-item">
        <div class="icon" style="background:#FCE4EC">👣</div>
        <span>浏览记录</span>
      </div>
    </div>

    <!-- 菜单 -->
    <div class="menu-group">
      <div class="menu-item">
        <span class="icon" style="color:var(--accent)">🛡️</span>
        <span class="label">我的会员</span>
        <span class="value">普通会员</span>
        <span class="arrow">›</span>
      </div>
      <div class="menu-item">
        <span class="icon" style="color:#2E7D32">🎁</span>
        <span class="label">积分商城</span>
        <span class="value">1280 积分</span>
        <span class="arrow">›</span>
      </div>
      <div class="menu-item">
        <span class="icon" style="color:#576B95">💬</span>
        <span class="label">联系客服</span>
        <span class="arrow">›</span>
      </div>
    </div>

    <div class="menu-group">
      <div class="menu-item">
        <span class="icon" style="color:var(--muted)">⚙️</span>
        <span class="label">设置</span>
        <span class="arrow">›</span>
      </div>
      <div class="menu-item">
        <span class="icon" style="color:var(--muted)">ℹ️</span>
        <span class="label">关于暖食集</span>
        <span class="value">v1.0.0</span>
        <span class="arrow">›</span>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item" onclick="location.href='home.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item" onclick="location.href='categories.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/><path d="M6 6h.008v.008H6V6z"/></svg>
      <span>分类</span>
    </div>
    <div class="tab-item" onclick="location.href='cart.html'">
      <div class="tab-icon-wrap">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>
        <span class="badge-dot"></span>
      </div>
      <span>购物车</span>
    </div>
    <div class="tab-item" onclick="location.href='orders.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/></svg>
      <span>订单</span>
    </div>
    <div class="tab-item active" onclick="location.href='profile.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
      <span>我的</span>
    </div>
  </div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
