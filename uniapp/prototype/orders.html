<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=393, initial-scale=1, maximum-scale=1">
<title>订单列表 — 暖食集</title>
<link rel="stylesheet" href="css/wechat-shop.css">
<style>
/* Tab 切换 */
.order-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 20;
}
.order-tab {
  flex: 1;
  text-align: center;
  padding: 12px 0;
  font-size: var(--text-sm);
  color: var(--muted);
  cursor: pointer;
  position: relative;
}
.order-tab.active { color: var(--accent); font-weight: 600; }
.order-tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 24px; height: 3px;
  background: var(--accent); border-radius: 2px;
}

/* 订单卡片 */
.order-card {
  background: var(--surface);
  margin: var(--space-3) var(--space-4);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.order-card .order-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-sm);
  border-bottom: 1px solid var(--border);
}
.order-card .order-header .shop { font-weight: 600; }
.order-card .order-header .status { color: var(--accent); font-weight: 500; }
.order-card .order-header .status.delivered { color: var(--success); }
.order-card .order-header .status.cancelled { color: var(--muted); }

.order-card .order-body {
  padding: var(--space-3) var(--space-4);
}
.order-card .order-product {
  display: flex; align-items: center; gap: var(--space-3);
  margin-bottom: var(--space-2);
}
.order-card .order-product:last-child { margin-bottom: 0; }
.order-card .order-product .thumb {
  width: 48px; height: 48px; border-radius: var(--radius-sm);
  background: #F8F8F8; display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.order-card .order-product .name { flex: 1; font-size: var(--text-sm); }
.order-card .order-product .qty { font-size: var(--text-sm); color: var(--muted); }

.order-card .order-footer {
  display: flex; justify-content: flex-end; gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--border);
}
.order-card .order-footer .total {
  flex: 1; font-size: var(--text-sm); text-align: left;
}
.order-card .order-footer .total .amount { font-weight: 700; color: var(--price-red); }
.order-card .order-footer .btn-sm {
  padding: 6px 14px; border-radius: var(--radius-pill);
  font-size: var(--text-sm); border: 1px solid var(--border);
  color: var(--fg);
}
.order-card .order-footer .btn-sm.primary { background: var(--accent); color: #fff; border-color: var(--accent); transition: transform var(--motion-fast); }
.order-card .order-footer .btn-sm.primary:active { transform: scale(0.95); }
.order-card .order-footer .btn-sm { transition: transform var(--motion-fast); }
.order-card .order-footer .btn-sm:active { transform: scale(0.95); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="dynamic-island"><span class="cam"></span></div>
  <div class="status-bar">
    <span class="time">9:41</span>
    <span class="icons">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 9l4 4-4 4"/><path d="M7 17h10l4-4-4-4H7"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </span>
  </div>

  <div class="nav-bar">
    <div class="back" onclick="history.back()">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="title">我的订单</div>
    <div class="action" style="width:auto"></div>
  </div>

  <!-- Tab -->
  <div class="order-tabs">
    <div class="order-tab active" onclick="switchTab(this)">全部</div>
    <div class="order-tab" onclick="switchTab(this)">待付款</div>
    <div class="order-tab" onclick="switchTab(this)">待发货</div>
    <div class="order-tab" onclick="switchTab(this)">待收货</div>
    <div class="order-tab" onclick="switchTab(this)">已完成</div>
  </div>

  <div class="page-content">
    <div id="orderList"></div>
  </div>

  <div class="tab-bar">
    <div class="tab-item" onclick="location.href='home.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item" onclick="location.href='categories.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/><path d="M6 6h.008v.008H6V6z"/></svg>
      <span>分类</span>
    </div>
    <div class="tab-item" onclick="location.href='cart.html'">
      <div class="tab-icon-wrap">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>
        <span class="badge-dot"></span>
      </div>
      <span>购物车</span>
    </div>
    <div class="tab-item active" onclick="location.href='orders.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/></svg>
      <span>订单</span>
    </div>
    <div class="tab-item" onclick="location.href='profile.html'">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
      <span>我的</span>
    </div>
  </div>

  <div class="home-indicator"></div>
</div>

<script>
const orders = [
  {
    shop: '暖食集 · 官方旗舰店', status: '已送达', statusClass: 'delivered',
    total: 85.7, count: 3,
    products: [
      { emoji: '🍚', name: '有机五常大米 5kg', qty: 1 },
      { emoji: '🥩', name: '黑猪肉脯 200g', qty: 2 },
    ],
    btns: ['再次购买']
  },
  {
    shop: '暖食集 · 官方旗舰店', status: '待收货', statusClass: '',
    total: 32.9, count: 1,
    products: [
      { emoji: '🥩', name: '黑猪肉脯 200g', qty: 1 },
    ],
    btns: ['查看物流', '确认收货']
  },
  {
    shop: '暖食集 · 官方旗舰店', status: '待付款', statusClass: '',
    total: 59.8, count: 2,
    products: [
      { emoji: '🫐', name: '云南高山蓝莓 125g×2盒', qty: 2 },
    ],
    btns: ['取消订单', '去付款']
  },
  {
    shop: '暖食集 · 官方旗舰店', status: '已取消', statusClass: 'cancelled',
    total: 39.9, count: 1,
    products: [
      { emoji: '☕', name: '哥伦比亚挂耳咖啡 10包', qty: 1 },
    ],
    btns: ['再次购买']
  },
];

function renderOrders() {
  const container = document.getElementById('orderList');
  container.innerHTML = '';
  orders.forEach(o => {
    const card = document.createElement('div');
    card.className = 'order-card';
    card.innerHTML = `
      <div class="order-header">
        <span class="shop">${o.shop}</span>
        <span class="status ${o.statusClass}">${o.status}</span>
      </div>
      <div class="order-body">
        ${o.products.map(p => `
          <div class="order-product">
            <div class="thumb">${p.emoji}</div>
            <span class="name">${p.name}</span>
            <span class="qty">×${p.qty}</span>
          </div>
        `).join('')}
      </div>
      <div class="order-footer">
        <div class="total">共 ${o.count} 件 · 合计 <span class="amount">¥${o.total}</span></div>
        ${o.btns.map((b, i) => `<button class="btn-sm ${b === '去付款' || b === '确认收货' ? 'primary' : ''}">${b}</button>`).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}

function switchTab(el) {
  document.querySelectorAll('.order-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

renderOrders();
</script>
</body>
</html>
